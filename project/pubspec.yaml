name: dou_dizhu
description: A beautiful local Dou Di Zhu (Fight the Landlord) card game with Apple-inspired design.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.2
  vibration: ^1.8.4
  confetti: ^0.7.0
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/cards/
    - assets/audio/
    - assets/images/
    - assets/images/avatar/
    
